<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The purpose of this website is to provide comprehensive information about our white water
        rafting
        expeditions, educate adventurers on river safety and equipment, and facilitate easy trip
        reservations for individuals and groups seeking outdoor excitement.</title>
    <meta name="description"
      content="Learn more about our White Water Rafting adventures, our mission, and the team behind the excitement.">
    <meta name="author" content="Dember Perez Colquehuanca">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/z-wwr-blue.jpg" alt="Logo company" width="150">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact-info">
            <h1>White Water Rafting Company</h1>
            <p>123 Main River Street<br>Kolob, California</p>
            <p>Tel: +1 999 999 9999<br>Email: info@whitewater.com</p>
        </section>
        <div class="map">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d3806.800353343592!2d-66.13449970904584!3d-17.421366211136228!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1ses-419!2sbo!4v1775315999456!5m2!1ses-419!2sbo"
              width="400" height="450" style="border:0;" allowfullscreen="" loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"></iframe>

        </div>

        <form class="contact-form">
            <div class="form-group">
                <label>Name</label>
                <input type="text" placeholder="Placeholder">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="Placeholder">
            </div>
            <div class="form-group">
                <label>Message Purpose</label>
                <div class="radio-group">
                    <label><input type="radio" name="purpose">General Inquiry</label>
                    <label><input type="radio" name="purpose">Reservation Question</label>
                    <label><input type="radio" name="purpose">Website Suggestion</label>
                </div>
            </div>

            <div class="form-group1">
                <label>Message</label>
                <textarea placeholder="Type here"></textarea>
            </div>

            <div class="newsletter">
                <input type="checkbox" id="news">
                <label for="news">Please Subscribe me to the monthly newsletter</label>
            </div>

            <button type="submit">Get in Touch!</button>
        </form>
    </main>

    <section class="team-section">
        <h2>We Are Here to Serve You</h2>
        <div class="team-grid">
            <div class="employee-card">
                <img src="images/profile.jpg" alt="Logo company" width="150">
                <p>Employee Profile</p>
            </div>
            <div class="employee-card">
                <img src="images/profile.jpg" alt="Logo company" width="150">
                <p>Employee Profile</p>
            </div>
            <div class="employee-card">
                <img src="images/profile.jpg" alt="Logo company" width="150">
                <p>Employee Profile</p>
            </div>
        </div>
    </section>
    <footer>
        <p>&copy; 2026 White Water Rafting | Dember Perez</p>
        <nav class="socialmedia">
            <a href="https://facebook.com" target="_blank">
                <img src="images/facebook.svg" alt="Facebook Icon" width="30"> </a>

            <a href="https://linkedin.com" target="_blank">
                <img src="images/linkedin.svg" alt="LinkedIn Icon" width="30">
            </a>
            <a href="https://instagram.com" target="_blank">
                <img src="images/instagram.svg" alt="Instagram Icon" width="30">
            </a>
        </nav>
    </footer>

</body>

</html>
